<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Bubble Bubble</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>

<!--All ths visual imgs (all in source file) in this project was generated by ChatGPT-->
<!--I have looked through some MDN pages especially on drag and drop, and did a small drag experiment in class.-->
<!--https://developer.mozilla.org/en-US/docs/Web/API/HTML_Drag_and_Drop_API-->

</head>
<!--set up an intro-dialog here for users.
    so that they can easily understand how to play with it.-->
<body>
    <dialog id="intro-dialog">
        <h1>Bubble Bubble</h1>
        <p>
            This is a milk tea shop simulation game.
            Follow the order and drag the required toppings into the milk tea cup step by step.
        </p>
        <button id="start-btn">Start</button>
    </dialog>

<!--upload the background img (the control console, the order lists, and toppings table)
    and this is the main section of this project, and it will fill up whole screen.-->

<!--and I found out browser will define this img as a draggable img which could lead to a bug,
    so I have to define the state of this img as false.-->
    <main class="game">

        <section class="drink-area">

            <img src="source/background.png" class="background" alt="milk tea background"
                 draggable="false">

<!--define some places for those draggable imgs, or the drag function will be false, cuz those
toppings are img from background, not elements built by HTML, and browser could not figure out where to -->
            <div id="hit-ice" class="hit-area" data-item="ice"></div>
            <div id="hit-pudding" class="hit-area" data-item="milk-pudding"></div>
            <div id="hit-boba" class="hit-area" data-item="boba"></div>
            <div id="hit-cream" class="hit-area" data-item="cream"></div>

<!--cup zone is the drop zone.-->
            <div id="cup-zone">

            <img id="ice-drop" class="hidden" src="source/ice drop.png" alt="ice drop">
            <img id="pudding-drop" class="hidden" src="source/milk pudding drop.png" alt="milk pudding drop">
            <img id="boba-drop" class="hidden" src="source/boba drop.png" alt="boba drop">

            </div>

        </section>

<!--set up two buttons for reset and done features-->
        <div class="button-group">
            <button id="reset-btn" class="game-btn">Reset</button>
            <button id="done-btn" class="game-btn">Done</button>
        </div>
    </main>

<!--this is the dialog for the endings, as long as players hit the "done" button, browser will run the code to check if
    they did a right choice. Right choice will trigger a good result dialog, wrong choice will lead to a bad result.-->
    <dialog id="result-dialog">
        <h2 id="result-title"></h2>
        <p id="result-message"></p>
        <button id="close-result-btn">OK</button>
    </dialog>
</body>
</html>
